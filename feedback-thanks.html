<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  body { font-family: Arial, sans-serif; background: white; }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
    50% { transform: scale(1.2) rotate(4deg); }
    75% { transform: scale(0.95) rotate(-2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes drawCheck {
    from { stroke-dashoffset: 50; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: white;
    padding: 16px 16px 8px 16px;
    text-align: center;
  }
  .circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #FF6600;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .title {
    font-size: 16px;
    font-weight: bold;
    color: #111;
    margin-bottom: 6px;
    animation: fadeUp 0.6s ease;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
    animation: fadeUp 0.6s ease;
  }
</style>
</head>
<body>
<div class="card">
  <div class="circle">
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
      <polyline
        points="6,18 14,27 30,10"
        stroke="white"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        stroke-dasharray="50"
        stroke-dashoffset="50"
        style="animation: drawCheck 0.8s ease 0.8s forwards;"
      />
    </svg>
  </div>
  <p class="title">Mulțumim! 🧡</p>
  <p class="subtitle">Feedback-ul tău contează pentru noi.</p>
</div>
</body>
</html>
