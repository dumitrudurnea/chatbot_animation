<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  body { font-family: Arial, sans-serif; background: white; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0) rotate(-30deg); }
    60% { transform: scale(1.3) rotate(10deg); }
    80% { transform: scale(0.9) rotate(-5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .card {
    background: white;
    padding: 16px;
    text-align: center;
    animation: fadeUp 0.6s ease;
  }
  .stars {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .star1 { font-size: 32px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both, pulse 2s ease 1s infinite; }
  .star2 { font-size: 32px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both, pulse 2s ease 1.2s infinite; }
  .star3 { font-size: 32px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both, pulse 2s ease 1.4s infinite; }
  .title { font-size: 14px; font-weight: bold; color: #111; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="stars">
    <span class="star1">⭐</span>
    <span class="star2">⭐</span>
    <span class="star3">⭐</span>
  </div>
  <p class="title">A fost util Djingo azi?</p>
  <p class="subtitle">Asta ne ajută să devenim mai buni.</p>
</div>
</body>
</html>
