<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: Arial, sans-serif;
    background: transparent;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    padding: 18px;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .title {
    font-size: 15px;
    font-weight: bold;
    color: #111;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .hint {
    font-size: 11px;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <p class="title">A fost util Djingo azi? 💬</p>
  <p class="subtitle">Părerea ta ne ajută să devenim mai buni pentru tine. Alege una din opțiunile de mai jos.</p>
  <p class="hint">⏱ Durează doar 15 secunde</p>
</div>
</body>
</html>
