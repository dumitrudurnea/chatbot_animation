<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
  font-family: Arial, sans-serif; 
  background: white; 
  padding: 0;
  margin: 0;
  }
  
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes wave {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(20deg); }
    40% { transform: rotate(-10deg); }
    60% { transform: rotate(15deg); }
    80% { transform: rotate(-5deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  .card {
    background: transparent;
    border-radius: 12px;
    border: none;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.6s ease;
}
  .robot-wrap {
    flex-shrink: 0;
    animation: float 3s ease-in-out infinite;
  }
  .text-wrap { flex: 1; }
  .title {
    font-size: 14px;
    font-weight: bold;
    color: #111;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .hint {
    font-size: 11px;
    color: #FF6600;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="card">
  <div class="robot-wrap">
    <svg width="64" height="80" viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Antena -->
      <line x1="32" y1="4" x2="32" y2="14" stroke="#FF6600" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="32" cy="3" r="3" fill="#FF6600">
        <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Cap -->
      <rect x="12" y="14" width="40" height="32" rx="10" fill="#FF6600"/>
      
      <!-- Occhi -->
      <g style="animation: blink 4s ease infinite;">
        <ellipse cx="23" cy="28" rx="5" ry="5" fill="white"/>
        <ellipse cx="41" cy="28" rx="5" ry="5" fill="white"/>
        <circle cx="24" cy="29" r="2.5" fill="#111"/>
        <circle cx="42" cy="29" r="2.5" fill="#111"/>
        <circle cx="25" cy="28" r="1" fill="white"/>
        <circle cx="43" cy="28" r="1" fill="white"/>
      </g>
      
      <!-- Gura zambitoare -->
      <path d="M22 36 Q32 43 42 36" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      
      <!-- Corp -->
      <rect x="16" y="48" width="32" height="22" rx="8" fill="#FF6600"/>
      
      <!-- Buton pe corp -->
      <circle cx="32" cy="57" r="4" fill="white" opacity="0.6"/>
      <circle cx="32" cy="57" r="2" fill="#FF6600"/>
      
      <!-- Linii decorative corp -->
      <rect x="22" y="64" width="6" height="3" rx="1.5" fill="white" opacity="0.4"/>
      <rect x="36" y="64" width="6" height="3" rx="1.5" fill="white" opacity="0.4"/>
      
      <!-- Brat stang cu wave -->
      <g style="transform-origin: 14px 52px; animation: wave 2.5s ease infinite;">
        <rect x="4" y="50" width="12" height="8" rx="4" fill="#FF6600"/>
      </g>
      
      <!-- Brat drept -->
      <rect x="48" y="50" width="12" height="8" rx="4" fill="#FF6600"/>
      
      <!-- Picioare -->
      <rect x="19" y="68" width="10" height="8" rx="4" fill="#FF6600"/>
      <rect x="35" y="68" width="10" height="8" rx="4" fill="#FF6600"/>
    </svg>
  </div>
  
  <div class="text-wrap">
    <p class="title">A fost util Djingo azi? 💬</p>
    <p class="subtitle">Părerea ta ne ajută să devenim mai buni pentru tine.</p>
    <p class="hint">⏱ Durează doar 15 secunde</p>
  </div>
</div>
</body>
</html>
